# airport-sdr configuration
#
# Validated on load. Unknown keys are an error rather than being silently
# ignored, so a typo fails loudly instead of quietly doing the wrong thing.

sdr:
  # SoapySDR device argument string. Empty selects the first device found, but
  # naming the driver also stops SoapySDR probing every installed module, which
  # is where the wall of ALSA and SSDP errors at startup comes from.
  # Examples: driver=rtlsdr | driver=lime | driver=airspy
  driver: "driver=lime"

  gain: 61
  auto_gain: false

  # Antenna port name, driver-specific. Empty lets the driver choose, which is
  # a trap on a device with several ports: the default is often the high-band
  # input, which is deaf at VHF and gives a capture at the noise floor.
  # LimeSDR Mini airband: LNAW (the wideband port). Run `airport-sdr probe` to
  # list what this device actually offers.
  antenna: "LNAW"

  # Crystal error correction in parts per million.
  ppm: 0

audio:
  # 8 kHz is ample for AM airband voice, which is bandlimited to ~3.4 kHz.
  # Every group's sample_rate must be an exact multiple of this.
  rate: 8000

server:
  # Loopback by default. Exposing the receiver beyond this host must always be
  # a deliberate act. The recommended way to reach it remotely is to put
  # Tailscale Serve in front rather than binding to 0.0.0.0.
  listen: "127.0.0.1:8080"

embed:
  # Sites permitted to frame a channel player at /embed/<channel>.
  #
  # Empty (the default) disables embedding entirely: /embed returns 404 and no
  # site can frame the receiver. Framing puts another site's visitors on your
  # radio, so it is opt-in per origin.
  #
  # Each entry is a bare origin — scheme, host and optional port, nothing else.
  # A whole page URL will never match the Origin a browser sends and is refused.
  #   allowed_origins:
  #     - "https://yoursite.example"
  #     - "http://localhost:9999"
  #
  # The single entry "*" permits any site on the internet. That suits a
  # deliberately public receiver and nothing else.
  allowed_origins: []

  # Default iframe size advertised by the oEmbed endpoint. The embedded player
  # is a single button, so it is small; an embedder can override it anyway.
  width: 280
  height: 64

# The radio covers one group at a time. Every channel inside the active group
# is demodulated in parallel; switching groups retunes the tuner.
#
# Each group's center_freq sits deliberately BETWEEN its channels, never on one:
# the DC spur at the local oscillator measured 60 dB above the noise floor here,
# and a channel parked on it is unreceivable. Validation enforces a 12.5 kHz
# minimum separation and a channel must stay within +/-40% of the sample rate.
groups:
  - name: Tower
    center_freq: 118250000
    sample_rate: 960000
    channels:
      # Verified receiving live traffic.
      - {name: Tower, freq: 118100000, squelch_db: -62}   # -150 kHz

  # NOTE: the frequencies below are taken from a published chart and have NOT
  # been confirmed on air yet. If they are European 8.33 kHz channel
  # DESIGNATORS rather than carrier frequencies, the real carriers sit a few kHz
  # away — enough to matter against a +/-5 kHz channel filter, and the symptom
  # would be muffled or missing audio rather than an obvious failure.
  # Confirm with:  airport-sdr record --group Ground && airport-sdr spectrum --group Ground
  - name: Ground
    center_freq: 121805000
    sample_rate: 960000
    channels:
      - {name: Apron S,  freq: 121755000, squelch_db: -62}   #  -50 kHz
      - {name: Apron N,  freq: 121855000, squelch_db: -62}   #  +50 kHz
      - {name: Ground,   freq: 121902000, squelch_db: -62}   #  +97 kHz
      - {name: Delivery, freq: 121925000, squelch_db: -62}   # +120 kHz

  - name: Approach
    center_freq: 125640000
    sample_rate: 960000
    channels:
      - {name: Approach,  freq: 125325000, squelch_db: -62}  # -315 kHz
      - {name: ATIS,      freq: 125725000, squelch_db: -62}  #  +85 kHz
      - {name: Departure, freq: 125950000, squelch_db: -62}  # +310 kHz
