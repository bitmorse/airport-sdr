<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>airport-sdr</title>
<style>
  :root {
    --bg: #14171c; --panel: #1c2027; --line: #2c323c;
    --text: #e6e9ef; --dim: #8b93a1; --accent: #4a9eff; --live: #34d17d;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f4f6f9; --panel: #fff; --line: #dde2ea;
      --text: #1a1d23; --dim: #666e7d; --accent: #0b6bcb; --live: #12904f;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 1.5rem 1rem; background: var(--bg); color: var(--text);
    font: 15px/1.5 ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  main { max-width: 44rem; margin: 0 auto; }
  h1 { font-size: 1.15rem; margin: 0 0 .25rem; letter-spacing: -.01em; }
  .sub { color: var(--dim); font-size: .85rem; margin-bottom: 1.5rem; }
  .card {
    background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
    padding: 1rem; margin-bottom: .75rem;
  }
  .row { display: flex; align-items: center; gap: .75rem; flex-wrap: wrap; }
  .name { font-weight: 600; }
  .freq { color: var(--dim); font-variant-numeric: tabular-nums; font-size: .9rem; }
  .spacer { flex: 1 1 auto; }
  button {
    font: inherit; font-weight: 500; color: #fff; background: var(--accent);
    border: 0; border-radius: 7px; padding: .45rem 1rem; cursor: pointer;
  }
  button.stop { background: #d1495b; }
  button:disabled { opacity: .5; cursor: default; }
  .dot { width: .6rem; height: .6rem; border-radius: 50%; background: var(--line); flex: none; }
  .dot.open { background: var(--live); box-shadow: 0 0 8px var(--live); }
  .meter {
    height: 6px; background: var(--line); border-radius: 3px;
    overflow: hidden; margin-top: .85rem;
  }
  .meter > i { display: block; height: 100%; width: 0; background: var(--accent); transition: width .18s; }
  .stats {
    margin-top: .6rem; color: var(--dim); font-size: .8rem;
    font-variant-numeric: tabular-nums; display: flex; gap: 1.25rem; flex-wrap: wrap;
  }
  .groups {
    display: flex; gap: .4rem; flex-wrap: wrap; margin-bottom: 1rem;
  }
  .groups button {
    background: var(--panel); color: var(--dim); border: 1px solid var(--line);
    font-weight: 500; padding: .4rem .85rem;
  }
  .groups button.on { background: var(--accent); color: #fff; border-color: var(--accent); }
  .groups button:disabled { opacity: .6; cursor: wait; }
  .card.idle { opacity: .55; }
  .card.idle .meter, .card.idle .stats { visibility: hidden; }
  .switchto {
    background: none; color: var(--accent); border: 1px solid var(--line);
    font-size: .85rem; padding: .3rem .7rem;
  }
  .err {
    color: #d1495b; font-size: .85rem; margin-bottom: .75rem; min-height: 1.2em;
  }
  .note {
    color: var(--dim); font-size: .82rem; margin-top: 1.25rem;
    border-top: 1px solid var(--line); padding-top: 1rem;
  }
  .note a { color: var(--accent); }
  /* No border or spacing when there is nothing to say. */
  .note:empty { display: none; }
  .warn { color: #e0a458; }
  code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: .95em; }
</style>
</head>
<body>
<main>
  <h1>airport-sdr</h1>
  <div class="sub" id="source">connecting…</div>
  <div class="groups" id="groups"></div>
  <div class="err" id="error"></div>
  <div id="channels"></div>
  <div class="note" id="note"></div>
</main>

<script src="/static/player.js"></script>
<script>
// The audio pipeline lives in player.js, shared with the embeddable player.
// This file is the page's UI on top of it.
const canUseWorklet = AirportSDR.canUseWorklet;

const state = { active: null, player: null, group: null };

async function boot() {
  const note = document.getElementById('note');
  let channels;
  try {
    channels = await (await fetch('/api/channels')).json();
  } catch (err) {
    document.getElementById('source').textContent = 'cannot reach the receiver';
    return;
  }

  // Only the active group's channels carry audio. The rest stay listed, so the
  // whole airfield is visible at once and switching is one click away.
  document.getElementById('channels').innerHTML = channels.map((c) => `
    <div class="card" data-name="${c.name}" data-group="${c.group || ''}">
      <div class="row">
        <span class="dot" data-role="squelch"></span>
        <span class="name">${c.name}</span>
        <span class="freq">${(c.freq / 1e6).toFixed(3)} MHz</span>
        <span class="spacer"></span>
        <button data-role="listen">Listen</button>
        <button class="switchto" data-role="switch" hidden></button>
      </div>
      <div class="meter"><i data-role="level"></i></div>
      <div class="stats">
        <span data-role="level-text">–</span>
        <span data-role="listeners"></span>
        <span data-role="buffer"></span>
      </div>
    </div>`).join('');

  for (const card of document.querySelectorAll('.card')) {
    card.querySelector('[data-role=listen]')
        .addEventListener('click', () => toggle(card.dataset.name));
    card.querySelector('[data-role=switch]')
        .addEventListener('click', () => activate(card.dataset.group));
  }

  await refreshGroups();

  // Nothing is shown in the normal case. The warning stays because without it
  // a listener on plain http silently gets the delayed WAV fallback with no
  // indication why, which looks like the receiver being slow.
  if (!canUseWorklet) {
    note.innerHTML = '<span class="warn">Delayed audio:</span> low-latency ' +
      'streaming needs https, so this page is using the WAV fallback.';
  }

  poll();
  setInterval(poll, 1000);
}

// The radio covers one group at a time, so switching retunes it for everyone
// listening. That is inherent to having a single tuner.
async function refreshGroups() {
  let groups;
  try {
    groups = await (await fetch('/api/groups')).json();
  } catch (err) {
    return;
  }

  const bar = document.getElementById('groups');
  if (!groups.length) { bar.hidden = true; return; }

  state.group = (groups.find((g) => g.active) || {}).name || null;
  bar.innerHTML = groups.map((g) => `
    <button data-group="${g.name}" class="${g.active ? 'on' : ''}">
      ${g.name} <span style="opacity:.7">${(g.center_freq / 1e6).toFixed(3)}</span>
    </button>`).join('');

  for (const b of bar.querySelectorAll('button')) {
    b.addEventListener('click', () => activate(b.dataset.group));
  }
  applyGroupToCards();
}

function applyGroupToCards() {
  for (const card of document.querySelectorAll('.card')) {
    const group = card.dataset.group;
    const live = !state.group || group === state.group;

    card.classList.toggle('idle', !live);
    card.querySelector('[data-role=listen]').hidden = !live;

    const sw = card.querySelector('[data-role=switch]');
    sw.hidden = live;
    sw.textContent = `Switch to ${group}`;
  }
}

async function activate(group) {
  if (!group || group === state.group) return;

  const error = document.getElementById('error');
  error.textContent = '';
  for (const b of document.querySelectorAll('.groups button')) b.disabled = true;

  try {
    const resp = await fetch(`/api/groups/${encodeURIComponent(group)}/activate`,
                            { method: 'POST' });
    if (!resp.ok) {
      // A refused switch leaves the previous group running, so say why rather
      // than leaving the page looking broken.
      error.textContent = (await resp.text()).trim() || `could not switch to ${group}`;
    } else {
      stop(); // the channel being listened to may no longer be live
    }
  } catch (err) {
    error.textContent = 'could not reach the receiver';
  }

  for (const b of document.querySelectorAll('.groups button')) b.disabled = false;
  await refreshGroups();
}

function toggle(name) {
  if (state.active === name) { stop(); return; }
  stop();
  start(name);
}

async function start(name) {
  const card = cardFor(name);
  state.player = AirportSDR.createPlayer({
    channel: name,
    onBuffer: (info) => {
      const el = card && card.querySelector('[data-role=buffer]');
      if (el) el.textContent = `buffer ${(info.buffered * 1000).toFixed(0)} ms`;
    },
    onError: (code) => { if (code === 'stream-failed' && state.active === name) stop(); },
  });

  state.active = name;
  markListening(name);
  await state.player.play();
}

function stop() {
  if (state.player) { state.player.pause(); state.player = null; }

  if (state.active) {
    const card = cardFor(state.active);
    if (card) {
      card.querySelector('[data-role=listen]').textContent = 'Listen';
      card.querySelector('[data-role=listen]').classList.remove('stop');
      card.querySelector('[data-role=buffer]').textContent = '';
    }
  }
  state.active = null;
}

function markListening(name) {
  const button = cardFor(name).querySelector('[data-role=listen]');
  button.textContent = 'Stop';
  button.classList.add('stop');
}

function cardFor(name) {
  return document.querySelector(`.card[data-name="${CSS.escape(name)}"]`);
}

async function poll() {
  let status;
  try {
    status = await (await fetch('/api/status')).json();
  } catch (err) {
    return;
  }

  document.getElementById('source').textContent = status.source;
  if (status.active_group && status.active_group !== state.group) {
    await refreshGroups();
  }
  for (const ch of status.channels) {
    const card = cardFor(ch.name);
    if (!card) continue;

    card.querySelector('[data-role=squelch]').classList.toggle('open', ch.squelch_open);
    // Map a useful slice of the dynamic range onto the meter: -90 dBFS is the
    // noise floor of a quiet channel, -30 is a strong local signal.
    const pct = Math.max(0, Math.min(100, ((ch.level_db + 90) / 60) * 100));
    card.querySelector('[data-role=level]').style.width = pct + '%';
    card.querySelector('[data-role=level-text]').textContent = ch.level_db.toFixed(1) + ' dBFS';
    card.querySelector('[data-role=listeners]').textContent =
      ch.listeners === 1 ? '1 listener' : `${ch.listeners} listeners`;
  }
}

boot();
</script>
</body>
</html>
